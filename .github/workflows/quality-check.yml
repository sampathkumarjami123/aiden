name: Quality Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare CI log directory
        run: mkdir -p ci-logs

      - name: Compile check
        run: |
          set -o pipefail
          python -m compileall aiden.py aiden_core.py aiden_web.py aiden_desktop.py aiden_voice.py 2>&1 | tee ci-logs/compile.log

      - name: Unit tests
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee ci-logs/unittest.log

      - name: Web app smoke test
        run: |
          python -m uvicorn aiden_web:app --host 127.0.0.1 --port 8000 > ci-logs/uvicorn.log 2>&1 &
          SERVER_PID=$!
          for i in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health > /dev/null; then
              break
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "Health endpoint did not become ready in time"
              kill $SERVER_PID
              exit 1
            fi
          done
          kill $SERVER_PID

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: ci-logs/
          if-no-files-found: ignore
