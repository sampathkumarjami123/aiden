name: Quality Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall aiden.py aiden_core.py aiden_web.py aiden_desktop.py aiden_voice.py

      - name: Web app smoke test
        run: |
          python -m uvicorn aiden_web:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          sleep 5
          curl --fail --silent --show-error http://127.0.0.1:8000 > /dev/null
          kill $SERVER_PID
